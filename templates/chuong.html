<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>Chuông xưởng DALI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body{margin:0;min-height:100vh;background:#1a1a2e;color:#fff;font-family:system-ui,-apple-system,sans-serif;
         display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
    .clock{font-size:min(22vw,9rem);font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
    .date{color:#9aa0b5;font-size:1.2rem;margin-top:6px}
    .next{margin-top:26px;font-size:1.25rem;color:#ffd166}
    .big-btn{margin-top:30px;border:none;border-radius:18px;padding:20px 44px;font-size:1.5rem;font-weight:800;cursor:pointer}
    #startBtn{background:#06d6a0;color:#06321f}
    #testBtn{background:transparent;border:2px solid #4a4e69;color:#9aa0b5;font-size:1rem;padding:10px 22px;border-radius:12px;margin-top:16px;cursor:pointer}
    .status{margin-top:14px;color:#9aa0b5;font-size:.95rem}
    .ringing{animation:flash .5s alternate infinite}
    @keyframes flash{from{background:#1a1a2e}to{background:#7b2d26}}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="clock" id="clock">--:--</div>
  <div class="date" id="date"></div>
  <div class="next" id="next"><i class="bi bi-bell"></i> Đang tải cấu hình…</div>

  <button id="startBtn" class="big-btn"><i class="bi bi-bell-fill"></i> BẬT CHUÔNG</button>
  <button id="testBtn" class="hidden"><i class="bi bi-music-note"></i> Thử chuông (3 tiếng)</button>
  <div class="status" id="status">Đặt máy này cắm loa ở xưởng, bấm BẬT CHUÔNG rồi để nguyên màn hình này.</div>

<script>
  // ================== CHUÔNG XƯỞNG ==================
  // Chuông kêu (ÂM THANH THẬT qua loa, không phải thông báo) TRƯỚC giờ hết nghỉ trưa N phút.
  var CFG = {lunch_end:'13:30', bell_before:3};
  var ctx = null, armed = false;

  function hm2min(s){ var p=(s||'').split(':'); return (+p[0])*60 + (+p[1]||0); }
  function pad(n){ return ('0'+n).slice(-2); }

  function loadCfg(){
    fetch('/chuong-config').then(function(r){return r.json();}).then(function(d){
      CFG = d;
      var bell = hm2min(d.lunch_end) - (d.bell_before||0);
      document.getElementById('next').innerHTML =
        '<i class="bi bi-bell"></i> Chuông dậy trưa: <b>' + pad(Math.floor(bell/60)) + ':' + pad(bell%60) + '</b>'
        + ' <span style="color:#9aa0b5">(hết nghỉ trưa ' + d.lunch_end + ', kêu trước ' + (d.bell_before||0) + " phút)</span>";
    }).catch(function(){});
  }
  loadCfg(); setInterval(loadCfg, 5*60*1000);   // cập nhật cấu hình mỗi 5 phút

  // Đồng hồ
  function tick(){
    var d = new Date();
    document.getElementById('clock').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes());
    document.getElementById('date').textContent =
      ['CN','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'][d.getDay()] + ', ' + d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
  }
  tick(); setInterval(tick, 1000);

  // ---- Tổng hợp tiếng chuông bằng Web Audio (1 tiếng "boong" ngân dài) ----
  function strike(t){
    [660, 1320, 1980].forEach(function(f, i){
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      var amp = [1.0, 0.4, 0.15][i];
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(amp, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + 1.8);
    });
  }
  function ring(strikes){
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    var t0 = ctx.currentTime + 0.05;
    for (var i = 0; i < strikes; i++) strike(t0 + i * 1.1);
    document.body.classList.add('ringing');
    setTimeout(function(){ document.body.classList.remove('ringing'); }, strikes * 1100 + 800);
  }

  // ---- Kiểm tra mỗi 5 giây: tới giờ chuông chưa ----
  function check(){
    if (!armed || !CFG.lunch_end) return;
    var d = new Date();
    var nowm = d.getHours() * 60 + d.getMinutes();
    var bell = hm2min(CFG.lunch_end) - (CFG.bell_before || 0);
    var today = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var lastRang = '';
    try { lastRang = localStorage.getItem('bell_last') || ''; } catch(e){}
    if (nowm === bell && lastRang !== today) {
      try { localStorage.setItem('bell_last', today); } catch(e){}
      ring(12);   // ~13 giây boong-boong để mọi người dậy
      document.getElementById('status').textContent = '🔔 Đã rung chuông dậy trưa lúc ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
  }
  setInterval(check, 5000);

  // ---- Bật chuông: cần 1 chạm để trình duyệt cho phát âm thanh + giữ màn hình sáng ----
  var wakeLock = null;
  function keepAwake(){
    if (!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function(wl){ wakeLock = wl; }).catch(function(){});
  }
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible' && armed) keepAwake();
  });

  document.getElementById('startBtn').addEventListener('click', function(){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    armed = true;
    keepAwake();
    ring(1);   // 1 tiếng xác nhận đã bật
    this.classList.add('hidden');
    document.getElementById('testBtn').classList.remove('hidden');
    document.getElementById('status').textContent = '✅ Chuông ĐANG BẬT — giữ nguyên trang này, màn hình sẽ tự giữ sáng.';
  });
  document.getElementById('testBtn').addEventListener('click', function(){ ring(3); });
</script>
</body>
</html>
