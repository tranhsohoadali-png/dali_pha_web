<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2E7D32">
  <title>Pha màu DALI</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/media/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pha màu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background:#f6f7f9; padding-bottom: 24px; }
    .topbar { position: sticky; top: 0; z-index: 10; background:#2E7D32; color:#fff; }
    .sw { width: 26px; height: 26px; border-radius:.3rem; border:1px solid rgba(0,0,0,.2); display:inline-block; vertical-align:middle; }
    .rc { background:#fff; border-radius:.7rem; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:.75rem; }
    .rc h2 { font-size:1.1rem; margin:0; }
    .gnum { font-variant-numeric: tabular-nums; font-weight:600; }
    .pha-btn { font-size:1.05rem; }
    table td { padding:.35rem .5rem; }
    #mwrap .btn { min-width:48px; }
  </style>
</head>
<body>

<div class="topbar p-2">
  <div class="d-flex align-items-center gap-2 mb-2">
    <i class="bi bi-droplet-half fs-4"></i>
    <h1 class="h5 mb-0 flex-grow-1">Công thức pha</h1>
    <button id="installBtn" class="btn btn-sm btn-light" style="display:none"><i class="bi bi-download"></i> Cài app</button>
  </div>
  <input id="q" class="form-control form-control-sm mb-2" placeholder="🔍 Tìm mã DALI / hex…">
  <div id="mwrap" class="input-group input-group-sm">
    <span class="input-group-text">Mẻ pha</span>
    <button type="button" class="btn btn-light mq" data-m="4">×4</button>
    <button type="button" class="btn btn-light mq" data-m="5">×5</button>
    <input id="mult" type="number" min="1" step="1" value="5" class="form-control" inputmode="numeric"
           style="max-width:64px" title="Hệ số khác (nếu cần)">
  </div>
</div>

<div class="p-2" id="list">
  {% for r in recipes %}
  <div class="rc p-2 recipe-card" data-dali="{{ r.dali }}" data-search="{{ r.dali|lower }} {{ r.hex|lower }}">
    <div class="d-flex align-items-center gap-2 mb-1">
      <span class="sw" style="background:#{{ r.hex }}"></span>
      <h2 class="flex-grow-1">{{ r.dali }} <small class="text-secondary">#{{ r.hex }}</small></h2>
      <button class="btn btn-success pha-btn px-3" data-dali="{{ r.dali }}"><i class="bi bi-droplet-fill"></i> Pha</button>
    </div>
    <table class="table table-sm mb-0">
      <tbody>
        {% for c in r.components %}
        <tr>
          <td>{% if c.rgb %}<span class="sw" style="background:rgb({{ c.rgb.0 }},{{ c.rgb.1 }},{{ c.rgb.2 }})"></span> {% endif %}{{ c.name }}</td>
          <td class="text-end gnum gcell" data-g="{{ c.grams }}">{{ c.grams }} g</td>
        </tr>
        {% endfor %}
        <tr class="table-light"><td class="fw-bold">Tổng</td><td class="text-end fw-bold gnum tcell" data-g="{{ r.total }}">{{ r.total }} g</td></tr>
      </tbody>
    </table>
  </div>
  {% empty %}
  <p class="text-secondary text-center py-5">Chưa có công thức nào.</p>
  {% endfor %}
  <p id="noResult" class="text-secondary text-center py-4" style="display:none">Không tìm thấy công thức.</p>
</div>

<div id="toast" style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#212529;color:#fff;padding:10px 16px;border-radius:8px;z-index:99;display:none;font-size:.95rem"></div>

<script>
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }

  // Cài app (Android/Chrome)
  var deferred = null;
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred = e; document.getElementById('installBtn').style.display=''; });
  document.getElementById('installBtn').addEventListener('click', function(){ if(deferred){ deferred.prompt(); deferred=null; this.style.display='none'; } });

  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(function(){t.style.display='none';},1800); }
  function round1(x){ return Math.round(x*10)/10; }

  // Nhân hệ số
  var mult = document.getElementById('mult');
  function applyMult(){
    var m = parseFloat(mult.value) || 1; if (m<=0) m=1;
    document.querySelectorAll('.gcell,.tcell').forEach(function(td){ td.textContent = round1(parseFloat(td.dataset.g)*m) + ' g'; });
    // làm nổi nút đang chọn (×4 / ×5)
    document.querySelectorAll('.mq').forEach(function(b){
      var on = (parseFloat(b.dataset.m) === m);
      b.classList.toggle('btn-warning', on);
      b.classList.toggle('btn-light', !on);
    });
  }
  mult.addEventListener('input', applyMult);
  document.querySelectorAll('.mq').forEach(function(b){ b.addEventListener('click', function(){ mult.value=this.dataset.m; applyMult(); }); });
  applyMult();   // áp dụng ×5 ngay khi mở

  // Tìm kiếm
  document.getElementById('q').addEventListener('input', function(){
    var s=this.value.trim().toLowerCase(), any=false;
    document.querySelectorAll('.recipe-card').forEach(function(c){
      var show = !s || (c.dataset.search||'').indexOf(s)!==-1; c.style.display=show?'':'none'; if(show) any=true;
    });
    document.getElementById('noResult').style.display = any?'none':'block';
  });

  // Bấm Pha (có xác nhận để tránh ghi nhầm)
  document.addEventListener('click', function(e){
    var pb=e.target.closest('.pha-btn'); if(!pb) return;
    var m=parseFloat(mult.value)||1; if(m<=0) m=1;
    if(!confirm('Ghi nhận đã PHA:\n' + pb.dataset.dali + '  ×' + m + ' ?')) return;
    var fd=new FormData(); fd.append('dali',pb.dataset.dali); fd.append('multiplier',m);
    pb.disabled=true;
    fetch('/pha',{method:'POST',body:fd}).then(function(r){return r.json();}).then(function(res){
      pb.disabled=false; toast(res.ok?('✓ '+res.msg):(res.msg||'Lỗi'));
    }).catch(function(){ pb.disabled=false; toast('Lỗi kết nối'); });
  });
</script>
</body>
</html>
