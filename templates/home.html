<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#198754">
  <title>DALI</title>
  <link rel="manifest" href="/manifest-app.webmanifest">
  <link rel="apple-touch-icon" href="/media/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DALI">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== DALI Brand (Stitch) — phủ lên Bootstrap, không đổi hành vi ===== */
    body{
      font-family:'Be Vietnam Pro',system-ui,-apple-system,"Segoe UI",sans-serif;
      background:#f4f6f6;
      padding-bottom:30px;
      -webkit-tap-highlight-color:transparent;
    }
    /* Header gradient kiểu Stitch */
    .topbar{
      position:sticky;top:0;z-index:10;
      background:linear-gradient(180deg,#198754 0%,#157347 100%);
      color:#fff;
      padding:.7rem .9rem .95rem;
      padding-top:calc(.7rem + env(safe-area-inset-top));
      border-radius:0 0 18px 18px;
      box-shadow:0 2px 12px rgba(25,135,84,.25);
    }
    .topbar .brand-logo{
      width:40px;height:40px;border-radius:11px;background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.18);
    }
    .topbar .brand-name{font-size:1.25rem;font-weight:800;letter-spacing:-.01em;line-height:1}
    .topbar .brand-sub{font-size:.8rem;font-weight:500;opacity:.88;margin-top:2px}
    .topbar .btn-light{border-radius:999px;font-weight:700;color:#157347}
    .topbar .btn-outline-light{
      border-radius:50%;width:36px;height:36px;
      display:inline-flex;align-items:center;justify-content:center;
      border-color:rgba(255,255,255,.55);
    }
    .topbar .btn-outline-light:active{transform:scale(.94)}
    /* Gợi ý cài iOS */
    #iosTip{border-radius:14px;border:1px solid #cfe2ff}
    /* Nhãn mục */
    .sect{
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
      color:#8a94a0;margin:.25rem .25rem .65rem;
    }
    /* Lưới tile */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:860px){.grid{grid-template-columns:repeat(4,1fr)}}
    /* Tile kiểu Stitch: thẻ trắng bo 16px + icon màu */
    .tile{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
      text-decoration:none;color:#212529;
      background:#fff;border:1px solid #e9ecef;border-radius:16px;
      padding:18px 10px;min-height:122px;
      box-shadow:0 2px 12px rgba(25,135,84,.07);
      font-weight:700;text-align:center;
      transition:transform .08s ease, box-shadow .12s ease;
    }
    .tile:active{transform:scale(.96)}
    .tile:hover{box-shadow:0 4px 16px rgba(25,135,84,.14);color:#212529}
    .tile .tile-ic{
      width:52px;height:52px;border-radius:14px;
      display:inline-flex;align-items:center;justify-content:center;
      color:#fff;flex:0 0 auto;
      box-shadow:0 4px 10px rgba(0,0,0,.14);
    }
    .tile .tile-ic i{font-size:1.6rem;line-height:1}
    .tile .tile-label{font-size:.92rem;line-height:1.2;font-weight:700}
  </style>
</head>
<body>
<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <img src="/media/icon-192.png" alt="Dali" class="brand-logo">
    <div class="flex-grow-1">
      <div class="brand-name">Dali</div>
      <div class="brand-sub">Xin chào, {{ user.username }}{% if user.is_staff %} · Quản lý{% endif %}</div>
    </div>
    <button id="installBtn" class="btn btn-sm btn-light" style="display:none"><i class="bi bi-download"></i> Cài app</button>
    <a href="/logout" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</div>

<div id="iosTip" class="alert alert-info m-2 mb-0 small" style="display:none">
  <i class="bi bi-phone"></i> Để cài thành app: bấm nút <b>Chia sẻ</b> <i class="bi bi-box-arrow-up"></i> ở Safari → <b>“Thêm vào MH chính”</b>.
</div>

<div class="p-2 pt-3 px-3" style="max-width:980px;margin:0 auto">
  <div class="sect"><i class="bi bi-grid-fill"></i> Chức năng</div>
  <div class="grid">
    {% for t in tiles %}
    <a class="tile" href="{{ t.url }}">
      <span class="tile-ic" style="background:{{ t.bg }}"><i class="bi {{ t.icon }}"></i></span>
      <span class="tile-label">{{ t.label }}</span>
    </a>
    {% endfor %}
  </div>
</div>

<script>
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }

  // Nút cài app (Android/Chrome)
  var deferred=null;
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; document.getElementById('installBtn').style.display=''; });
  document.getElementById('installBtn').addEventListener('click', function(){ if(deferred){ deferred.prompt(); deferred=null; this.style.display='none'; } });

  // iOS Safari: không có beforeinstallprompt -> hiện hướng dẫn (nếu chưa ở chế độ app)
  (function(){
    var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    var standalone=window.navigator.standalone===true || window.matchMedia('(display-mode: standalone)').matches;
    if(isIOS && !standalone){ document.getElementById('iosTip').style.display=''; }
  })();
</script>
</body>
</html>
