<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2E7D32">
  <title>Đăng nhập · Pha màu DALI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>body{background:#2E7D32}</style>
</head>
<body>
<div class="container" style="max-width:420px;">
  <div class="card shadow mt-5 border-0">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-droplet-half text-success" style="font-size:2.6rem"></i>
        <h4 class="mt-2 mb-0">Công thức pha DALI</h4>
        <div class="text-secondary small">Đăng nhập để tiếp tục</div>
      </div>
      {% if messages %}{% for m in messages %}<div class="alert alert-danger py-2">{{ m }}</div>{% endfor %}{% endif %}
      <form method="POST" action="/login{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" name="username" class="form-control form-control-lg" required autofocus
                 autocapitalize="none" autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control form-control-lg" required
                 autocomplete="current-password">
        </div>
        <button class="btn btn-success btn-lg w-100"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
